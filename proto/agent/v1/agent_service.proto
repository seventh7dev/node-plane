syntax = "proto3";

package nodeplane.agent.v1;

import "agent/v1/types.proto";

service NodeAgentService {
  rpc GetRuntimeFacts(AgentEmpty) returns (RuntimeFacts);
  rpc GetNodeHealth(AgentEmpty) returns (LocalHealth);
  rpc ListRemoteProfiles(ListRemoteProfilesRequest) returns (ListRemoteProfilesResponse);
  rpc RunDiagnostics(RunDiagnosticsRequest) returns (RunDiagnosticsResponse);
  rpc CheckPorts(CheckPortsRequest) returns (CheckPortsResponse);
  rpc SyncNodeEnv(SyncNodeEnvRequest) returns (SyncNodeEnvResponse);
  rpc OpenPorts(OpenPortsRequest) returns (OpenPortsResponse);
  rpc SyncRuntimeFiles(SyncRuntimeFilesRequest) returns (SyncRuntimeFilesResponse);
  rpc SyncXray(SyncXrayRequest) returns (SyncXrayResponse);
  rpc InstallDocker(InstallDockerRequest) returns (InstallDockerResponse);
  rpc DeleteRuntime(DeleteRuntimeRequest) returns (DeleteRuntimeResponse);
  rpc InitXray(InitXrayRequest) returns (InitXrayResponse);
  rpc DeployXray(AgentEmpty) returns (RuntimeCommandResponse);
  rpc InitAwg(AgentEmpty) returns (RuntimeCommandResponse);
  rpc DeployAwg(AgentEmpty) returns (RuntimeCommandResponse);
  rpc PathExists(PathExistsRequest) returns (PathExistsResponse);
  rpc RemoveAuthorizedKey(RemoveAuthorizedKeyRequest) returns (RemoveAuthorizedKeyResponse);
  rpc AddXrayUser(AddXrayUserRequest) returns (RuntimeCommandResponse);
  rpc DeleteXrayUser(DeleteProfileRequest) returns (RuntimeCommandResponse);
  rpc AddAwgUser(AddAwgUserRequest) returns (RuntimeCommandResponse);
  rpc DeleteAwgUser(DeleteProfileRequest) returns (RuntimeCommandResponse);
}

message ListRemoteProfilesRequest {
  string protocol_kind = 1;
}

message ListRemoteProfilesResponse {
  repeated RemoteProfileRecord items = 1;
}

message RunDiagnosticsRequest {}

message RunDiagnosticsResponse {
  string summary = 1;
  repeated DiagnosticItem items = 2;
}

message CheckPortsRequest {
  repeated PortCheckSpec items = 1;
}

message CheckPortsResponse {
  string summary = 1;
  repeated PortStatus items = 2;
}

message SyncNodeEnvRequest {
  string content = 1;
}

message SyncNodeEnvResponse {
  string summary = 1;
  string path = 2;
}

message OpenPortsRequest {
  repeated PortCheckSpec items = 1;
}

message OpenPortsResponse {
  string summary = 1;
  repeated PortStatus items = 2;
}

message SyncRuntimeFilesRequest {
  repeated RuntimeFileSpec files = 1;
}

message SyncRuntimeFilesResponse {
  string summary = 1;
  uint32 written_files = 2;
}

message SyncXrayRequest {
  string config_path = 1;
  string public_host = 2;
  string flow = 3;
  string image = 4;
}

message SyncXrayResponse {
  string summary = 1;
  string generated_json = 2;
}

message InstallDockerRequest {}

message InstallDockerResponse {
  string summary = 1;
}

message DeleteRuntimeRequest {
  bool preserve_config = 1;
}

message DeleteRuntimeResponse {
  string summary = 1;
}

message InitXrayRequest {
  string config_path = 1;
  string public_host = 2;
  string sni_host = 3;
  uint32 tcp_port = 4;
  uint32 xhttp_port = 5;
  string xhttp_path_prefix = 6;
  string flow = 7;
  string image = 8;
}

message InitXrayResponse {
  string summary = 1;
  string generated_json = 2;
}

message RuntimeCommandResponse {
  string summary = 1;
}

message PathExistsRequest {
  string path = 1;
}

message PathExistsResponse {
  bool exists = 1;
}

message RemoveAuthorizedKeyRequest {
  string public_key = 1;
}

message RemoveAuthorizedKeyResponse {
  string summary = 1;
  bool removed = 2;
}

message AddXrayUserRequest {
  string profile_name = 1;
  string uuid = 2;
  string short_id = 3;
}

message AddAwgUserRequest {
  string profile_name = 1;
}

message DeleteProfileRequest {
  string profile_name = 1;
}
